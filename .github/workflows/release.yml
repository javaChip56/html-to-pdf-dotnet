name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore HtmlToPdf.Tests/HtmlToPdf.Tests.csproj

      - name: Build
        run: dotnet build HtmlToPdf.Tests/HtmlToPdf.Tests.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test HtmlToPdf.Tests/HtmlToPdf.Tests.csproj --configuration Release --no-build

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.1.0-preview.${GITHUB_RUN_NUMBER}"
          fi
          echo "package_version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Pack
        run: dotnet pack HtmlToPdf/HtmlToPdf.csproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.package_version }} --output ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*.nupkg
          if-no-files-found: error

      - name: Publish to NuGet
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
