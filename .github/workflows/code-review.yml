name: Code Review

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore HtmlToPdf.Tests/HtmlToPdf.Tests.csproj

      - name: Verify library formatting
        run: dotnet format HtmlToPdf/HtmlToPdf.csproj --verify-no-changes --no-restore --verbosity minimal

      - name: Verify test formatting
        run: dotnet format HtmlToPdf.Tests/HtmlToPdf.Tests.csproj --verify-no-changes --no-restore --verbosity minimal

      - name: Treat warnings as errors
        run: dotnet build HtmlToPdf.Tests/HtmlToPdf.Tests.csproj --configuration Release --no-restore -warnaserror
